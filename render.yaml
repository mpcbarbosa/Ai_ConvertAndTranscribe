databases:
  - name: transcribex-db
    plan: basic-256mb
    databaseName: transcribex
    user: transcribex
    ipAllowList: []

services:
  # Web service (Next.js)
  - type: web
    name: transcribex-web
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && rm -rf .next && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcribex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: transcribex-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /opt/render/project/storage
      - key: MAX_UPLOAD_SIZE_MB
        value: "500"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        generateValue: true
    disk:
      name: transcribex-storage
      mountPath: /opt/render/project/storage
      sizeGB: 10

  # Worker service
  - type: worker
    name: transcribex-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/worker/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcribex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: transcribex-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /opt/render/project/storage
      - key: NODE_ENV
        value: production
    disk:
      name: transcribex-worker-storage
      mountPath: /opt/render/project/storage
      sizeGB: 10

  # Redis
  - type: redis
    name: transcribex-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
